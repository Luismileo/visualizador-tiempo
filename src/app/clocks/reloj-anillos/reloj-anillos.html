<div class="rings-clock-wrapper">
  <svg class="rings-svg" viewBox="0 0 300 300">
    <defs>
      <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
      <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
      <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </defs>

    <!-- 1. ANILLO EXTERIOR (Segundos - Rojo) -->
    <circle class="ring-track" cx="150" cy="150" r="120" />
    <circle 
      class="ring-progress ring-seconds" 
      cx="150" 
      cy="150" 
      r="120" 
      [style.strokeDasharray]="strokeOuter"
      [style.strokeDashoffset]="offsets().seconds"
    />
    <!-- Cortador de 60 divisiones (Ancho de raya: 2px, espacio restante: 10.566px) -->
    <circle class="ring-divider" cx="150" cy="150" r="120" stroke-dasharray="2 10.566" />

    <!-- 2. ANILLO MEDIO (Minutos - Verde) -->
    <circle class="ring-track" cx="150" cy="150" r="90" />
    <circle 
      class="ring-progress ring-minutes" 
      cx="150" 
      cy="150" 
      r="90" 
      [style.strokeDasharray]="strokeMiddle"
      [style.strokeDashoffset]="offsets().minutes"
    />
    <!-- Cortador de 60 divisiones (Ancho de raya: 2px, espacio restante: 7.424px) -->
    <circle class="ring-divider" cx="150" cy="150" r="90" stroke-dasharray="2 7.424" />

    <!-- 3. ANILLO INTERIOR (Horas - Azul) -->
    <circle class="ring-track" cx="150" cy="150" r="60" />
    <circle 
      class="ring-progress ring-hours" 
      cx="150" 
      cy="150" 
      r="60" 
      [style.strokeDasharray]="strokeInner"
      [style.strokeDashoffset]="offsets().hours"
    />
    <!-- Cortador de 24 divisiones (Ancho de raya: 2px, espacio restante: 13.708px) -->
    <circle class="ring-divider" cx="150" cy="150" r="60" stroke-dasharray="2 13.708" />
  </svg>
</div>
