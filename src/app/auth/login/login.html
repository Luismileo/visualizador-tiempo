<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>CronosLab</h2>
      <p>Visualizador Avanzado de Tiempo</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Usuario de Ingeniería</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username" 
          placeholder="Ej. admin"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••"
        />
      </div>

      <!-- Alerta dinámica usando las nuevas condicionales de Angular 17+ -->
      @if (errorMessage()) {
        <div class="error-alert">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" [disabled]="loginForm.invalid" class="btn-submit">
        Ingresar al Sistema
      </button>
    </form>
  </div>
</div>
